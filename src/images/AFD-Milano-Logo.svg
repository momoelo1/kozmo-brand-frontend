<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 -50 598 700" width="598" height="700" role="img" aria-label="AFD Milano logo">
  <title>AFD Milano</title>
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb84d" stop-opacity="0.32"></stop>
      <stop offset="0.5" stop-color="#ffb84d" stop-opacity="0.08"></stop>
      <stop offset="0.72" stop-color="#ffb84d" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="0.44" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.8"></stop>
      <stop offset="0.56" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
      
    </linearGradient>
    <mask id="logoMask" maskUnits="userSpaceOnUse" x="0" y="0" width="598" height="600">
      <image x="0" y="0" width="598" height="600"></image>
    </mask>
  </defs>

  
  <g>
    

    
    <ellipse cx="299" cy="300" rx="300" ry="300" fill="url(#glow)">
      
    </ellipse>

    
    <image x="0" y="0" width="598" height="600"></image>

    
    <g mask="url(#logoMask)" style="mix-blend-mode:screen">
      <rect x="0" y="0" width="598" height="600" fill="url(#sheen)"></rect>
    </g>
  </g>
</svg>